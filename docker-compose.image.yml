name: ghost_browser_mcp

services:
  ghost-browser-mcp:
    image: ghcr.io/bu3no77xl/ghost_browser_mcp:latest
    shm_size: "1gb"
    environment:
      PORT: "8000"
      DISPLAY: ":99"
      XVFB_WHD: "1920x1080x24"
      GHOST_ENABLE_NOVNC: "true"
      GHOST_REMOTE_VIEWER_ENABLED: "true"
      GHOST_REMOTE_VIEWER_PUBLIC_URL: "${GHOST_REMOTE_VIEWER_PUBLIC_URL:-http://localhost:6080}"
      GHOST_REMOTE_VIEWER_TOKEN_SECRET: "${GHOST_REMOTE_VIEWER_TOKEN_SECRET:-change-me-local-only}"
      GHOST_REMOTE_VIEWER_TOKEN_TTL_SECONDS: "${GHOST_REMOTE_VIEWER_TOKEN_TTL_SECONDS:-900}"
      STEALTH_BROWSER_STORAGE_FILE: "/data/storage/instances.json"
      GHOST_CLIENT_WORKSPACE: "/workspace"
      GHOST_CLIENT_WORKSPACE_HOST: "${GHOST_CLIENT_WORKSPACE_HOST:-ghost_browser_mcp_output}"
    ports:
      - "8000:8000"
      - "127.0.0.1:6080:6080"
    volumes:
      - ghost_browser_mcp_data:/data
      - ./ghost_browser_mcp_output:/workspace
    restart: unless-stopped

volumes:
  ghost_browser_mcp_data:
