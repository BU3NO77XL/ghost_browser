name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "latest"
  DOCKER_IMAGE: ghcr.io/bu3no77xl/ghost_browser_mcp

permissions:
  contents: read
  packages: write

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — LINT & FORMAT CHECK
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Check formatting (black)
        run: uv run black --check src/ tests/ --line-length 100

      - name: Check import order (isort)
        run: uv run isort --check-only src/ tests/ --profile black --line-length 100

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — SECURITY SCAN (pip-audit)
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: pip-audit (dependency vulnerabilities)
        run: uv run pip-audit

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — UNIT TESTS (Core Services + Infrastructure)
# ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: [lint, security]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests with coverage
        run: |
          mkdir -p reports
          uv run python -m pytest \
            tests/unit/test_core_modules.py \
            tests/unit/test_race_conditions.py \
            tests/unit/test_persistence.py \
            tests/unit/test_login_guard.py \
            -v --tb=short \
            --html=reports/unit-tests.html \
            --self-contained-html \
            --cov=src \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/coverage-html \
            --cov-report=term-missing \
            -p no:warnings
        env:
          PYTHONIOENCODING: utf-8

      - name: Coverage summary
        if: always()
        run: |
          uv run python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('reports/coverage.xml')
          root = tree.getroot()
          line_rate = float(root.attrib.get('line-rate', 0)) * 100
          print(f'Coverage: {line_rate:.1f}%')
          "

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: reports/

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — INTEGRATION TESTS (Tools Layer)
# ─────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Run integration tests
        run: |
          mkdir -p reports
          uv run python -m pytest \
            tests/integration/test_browser_tools.py \
            tests/integration/test_element_tools.py \
            tests/integration/test_network_tools.py \
            tests/integration/test_navigation_flow.py \
            tests/integration/test_login_flow.py \
            -v --tb=short \
            --html=reports/integration-tests.html \
            --self-contained-html \
            -p no:warnings
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: reports/

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — E2E TESTS (MCP Protocol Layer)
# ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "E2E Tests"
    runs-on: ubuntu-latest
    needs: [integration-tests]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Run E2E tests
        run: |
          mkdir -p reports
          uv run python -m pytest \
            tests/e2e/test_mcp_interface.py \
            tests/e2e/test_integration_full.py \
            tests/e2e/test_final_smoke.py \
            -v --tb=short \
            --html=reports/e2e-tests.html \
            --self-contained-html \
            -p no:warnings
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: reports/

# ─────────────────────────────────────────────────────────────────────────────
# JOB 6 — DOCKER IMAGE BUILD, SMOKE TEST, AND PUBLISH
# ─────────────────────────────────────────────────────────────────────────────
  docker-image:
    name: "Docker Image"
    runs-on: ubuntu-latest
    needs: [e2e-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose files
        run: |
          docker compose config
          docker compose -f docker-compose.image.yml config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:ci

      - name: Start Docker smoke-test container
        run: |
          docker run -d \
            --name ghost-browser-mcp-ci \
            --shm-size=1g \
            -p 8000:8000 \
            -p 127.0.0.1:6080:6080 \
            -e GHOST_ENABLE_NOVNC=true \
            -e GHOST_REMOTE_VIEWER_ENABLED=true \
            -e GHOST_REMOTE_VIEWER_PUBLIC_URL=http://localhost:6080 \
            -e GHOST_REMOTE_VIEWER_TOKEN_SECRET=ci-smoke-test \
            ${{ env.DOCKER_IMAGE }}:ci

      - name: Smoke test Docker runtime
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.error
          import urllib.request

          MCP_URL = "http://localhost:8000/mcp"
          NOVNC_URL = "http://localhost:6080/vnc.html"
          ACCEPT = "application/json, text/event-stream"
          EXPECTED_TOOLS = 225

          def wait_for_url(url, headers=None, timeout=90):
              deadline = time.time() + timeout
              last_error = None
              while time.time() < deadline:
                  try:
                      request = urllib.request.Request(url, headers=headers or {})
                      with urllib.request.urlopen(request, timeout=5) as response:
                          return response.status
                  except Exception as exc:
                      last_error = exc
                      time.sleep(2)
              raise RuntimeError(f"{url} did not become ready: {last_error}")

          def post_mcp(payload, session_id=None):
              headers = {
                  "Accept": ACCEPT,
                  "Content-Type": "application/json",
              }
              if session_id:
                  headers["mcp-session-id"] = session_id
              request = urllib.request.Request(
                  MCP_URL,
                  data=json.dumps(payload).encode("utf-8"),
                  headers=headers,
                  method="POST",
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  body = response.read().decode("utf-8")
                  return response.headers, body

          def wait_for_mcp_initialize(timeout=90):
              deadline = time.time() + timeout
              last_error = None
              while time.time() < deadline:
                  try:
                      init = {
                          "jsonrpc": "2.0",
                          "id": 1,
                          "method": "initialize",
                          "params": {
                              "protocolVersion": "2024-11-05",
                              "capabilities": {},
                              "clientInfo": {"name": "docker-ci-smoke", "version": "0.1"},
                          },
                      }
                      headers, body = post_mcp(init)
                      session_id = headers.get("mcp-session-id")
                      if not session_id:
                          raise RuntimeError("MCP initialize did not return mcp-session-id")
                      return session_id, body
                  except Exception as exc:
                      last_error = exc
                      time.sleep(2)
              raise RuntimeError(f"MCP initialize did not become ready: {last_error}")

          def read_sse_json(body):
              for line in body.splitlines():
                  if line.startswith("data: "):
                      return json.loads(line.removeprefix("data: "))
              raise RuntimeError(f"No SSE data line in response: {body[:500]}")

          wait_for_url(NOVNC_URL, timeout=90)
          session_id, _ = wait_for_mcp_initialize(timeout=90)

          initialized = {"jsonrpc": "2.0", "method": "notifications/initialized", "params": {}}
          post_mcp(initialized, session_id=session_id)

          tools_list = {"jsonrpc": "2.0", "id": 2, "method": "tools/list", "params": {}}
          _, body = post_mcp(tools_list, session_id=session_id)
          payload = read_sse_json(body)
          tools = payload["result"]["tools"]
          if len(tools) != EXPECTED_TOOLS:
              raise RuntimeError(f"Expected {EXPECTED_TOOLS} tools, got {len(tools)}")

          print(f"Docker smoke test passed: noVNC reachable, MCP initialized, {len(tools)} tools exposed.")
          PY

      - name: Show Docker logs on failure
        if: failure()
        run: docker logs ghost-browser-mcp-ci || true

      - name: Stop Docker smoke-test container
        if: always()
        run: docker rm -f ghost-browser-mcp-ci || true

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag ${{ env.DOCKER_IMAGE }}:ci ${{ env.DOCKER_IMAGE }}:latest
          docker tag ${{ env.DOCKER_IMAGE }}:ci ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE }}:latest
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
