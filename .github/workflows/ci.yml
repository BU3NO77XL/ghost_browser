name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "latest"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — LINT & FORMAT CHECK
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Check formatting (black)
        run: uv run black --check src/ tests/ --line-length 100

      - name: Check import order (isort)
        run: uv run isort --check-only src/ tests/ --profile black --line-length 100

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — SECURITY SCAN (pip-audit)
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: pip-audit (dependency vulnerabilities)
        run: uv run pip-audit

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — UNIT TESTS
# ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: [lint, security]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests with coverage
        run: |
          mkdir -p reports
          uv run python -m pytest \
            tests/test_core_modules.py \
            tests/test_race_conditions.py \
            tests/test_persistence.py \
            tests/test_login_guard.py \
            -v --tb=short \
            --html=reports/unit-tests.html \
            --self-contained-html \
            --cov=src \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/coverage-html \
            --cov-report=term-missing \
            -p no:warnings
        env:
          PYTHONIOENCODING: utf-8

      - name: Coverage summary
        if: always()
        run: |
          uv run python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('reports/coverage.xml')
          root = tree.getroot()
          line_rate = float(root.attrib.get('line-rate', 0)) * 100
          print(f'Coverage: {line_rate:.1f}%')
          "
