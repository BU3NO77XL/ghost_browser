name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "latest"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — LINT & FORMAT CHECK
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Check formatting (black)
        run: uv run black --check src/ tests/ --line-length 100

      - name: Check import order (isort)
        run: uv run isort --check-only src/ tests/ --profile black --line-length 100

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — SECURITY SCAN (pip-audit)
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: pip-audit (dependency vulnerabilities)
        run: uv run pip-audit

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — UNIT TESTS (Core Services + Infrastructure)
# ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: [lint, security]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests with coverage
        run: |
          mkdir -p reports
          uv run python -m pytest \
            tests/unit/test_core_modules.py \
            tests/unit/test_race_conditions.py \
            tests/unit/test_persistence.py \
            tests/unit/test_login_guard.py \
            -v --tb=short \
            --html=reports/unit-tests.html \
            --self-contained-html \
            --cov=src \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/coverage-html \
            --cov-report=term-missing \
            -p no:warnings
        env:
          PYTHONIOENCODING: utf-8

      - name: Coverage summary
        if: always()
        run: |
          uv run python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('reports/coverage.xml')
          root = tree.getroot()
          line_rate = float(root.attrib.get('line-rate', 0)) * 100
          print(f'Coverage: {line_rate:.1f}%')
          "

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: reports/

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — INTEGRATION TESTS (Tools Layer)
# ─────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2

      - name: Run integration tests
        run: |
          mkdir -p reports
          uv run python -m pytest \
            tests/integration/test_browser_tools.py \
            tests/integration/test_element_tools.py \
            tests/integration/test_network_tools.py \
            tests/integration/test_navigation_flow.py \
            tests/integration/test_login_flow.py \
            -v --tb=short \
            --html=reports/integration-tests.html \
            --self-contained-html \
            -p no:warnings
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: reports/

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — E2E TESTS (MCP Protocol Layer)
# ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "E2E Tests"
    runs-on: ubuntu-latest
    needs: [integration-tests]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2

      - name: Run E2E tests
        run: |
          mkdir -p reports
          uv run python -m pytest \
            tests/e2e/test_mcp_interface.py \
            tests/e2e/test_integration_full.py \
            tests/e2e/test_final_smoke.py \
            -v --tb=short \
            --html=reports/e2e-tests.html \
            --self-contained-html \
            -p no:warnings
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: reports/
