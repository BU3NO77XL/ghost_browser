name: CI/CD Pipeline

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions for GHCR push and security tab
permissions:
  contents: read
  packages: write
  security-events: write

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "latest"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — LINT & FORMAT CHECK
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Check formatting (black)
        run: uv run black --check src/ tests/ --line-length 100

      - name: Check import order (isort)
        run: uv run isort --check-only src/ tests/ --profile black --line-length 100

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — SECURITY SCAN (SAST)
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: uv sync --dev

      - name: SAST — Bandit (code vulnerabilities)
        run: |
          uv run bandit -r src/ \
            -f json -o reports/bandit.json \
            --severity-level medium \
            --confidence-level medium \
            -x src/.storage \
            || true
          uv run bandit -r src/ \
            --severity-level medium \
            --confidence-level medium \
            -x src/.storage
        continue-on-error: false

      - name: SCA — pip-audit (dependency vulnerabilities)
        run: |
          uv run pip-audit \
            --format json \
            --output reports/pip-audit.json \
            || true
          uv run pip-audit

      - name: SCA — Safety (known CVEs)
        run: |
          uv run safety check \
            --json \
            --output reports/safety.json \
            || true
        continue-on-error: true  # safety may have false positives

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: reports/
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — UNIT TESTS
# ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests with coverage
        run: |
          mkdir -p reports
          uv run python -m pytest \
            tests/test_core_modules.py \
            tests/test_race_conditions.py \
            tests/test_persistence.py \
            tests/test_login_guard.py \
            -v --tb=short \
            --html=reports/unit-tests.html \
            --self-contained-html \
            --cov=src \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/coverage-html \
            --cov-report=term-missing \
            -p no:warnings
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: |
            reports/unit-tests.html
            reports/coverage.xml
            reports/coverage-html/
          retention-days: 30

      - name: Coverage summary
        if: always()
        run: |
          uv run python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('reports/coverage.xml')
          root = tree.getroot()
          line_rate = float(root.attrib.get('line-rate', 0)) * 100
          print(f'Coverage: {line_rate:.1f}%')
          "

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — DOCKER BUILD & SCAN
# ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: "Docker Build & Scan"
    runs-on: ubuntu-latest
    needs: [unit-tests, security]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: stealth-browser-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Container scan — Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: stealth-browser-mcp:${{ github.sha }}
          format: "sarif"
          output: "reports/trivy.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('reports/trivy.sarif') != ''
        with:
          sarif_file: reports/trivy.sarif
        continue-on-error: true

      - name: Container scan — summary
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: stealth-browser-mcp:${{ github.sha }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
        continue-on-error: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — DEPLOY (only on push to main/master)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push to GHCR
        id: deploy
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy summary
        run: |
          echo "### Deploy concluido" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ghcr.io/${{ github.repository }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "**SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
